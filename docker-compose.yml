services:
  asd_runtime:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        BASE_IMAGE: ${ASD_BASE_IMAGE:-10.51.33.201:30002/navi_project/ros:noetic-l4t-r36.3.0}
        ROS_DISTRO: ${ASD_ROS_DISTRO:-noetic}
        ROS_ROOT: ${ASD_ROS_ROOT:-/opt/ros/${ASD_ROS_DISTRO:-noetic}}
        ROS_SETUP_PATH: ${ASD_ROS_SETUP_PATH:-/ros_noetic/catkin_ws/devel/setup.bash}
        ROS_FALLBACK_SETUP_PATH: ${ASD_ROS_FALLBACK_SETUP_PATH:-/ros_noetic/catkin_ws/devel/setup.bash}
        INSTALL_APT: "1"
        INSTALL_PY_DEPS: "1"
        INSTALL_NVIDIA_APT_SOURCES: ${ASD_INSTALL_NVIDIA_APT_SOURCES:-0}
        NVIDIA_JETSON_APT_DIST: ${ASD_NVIDIA_JETSON_APT_DIST:-r36.4}
        NVIDIA_JETSON_SOC: ${ASD_NVIDIA_JETSON_SOC:-t234}
        INSTALL_CUDNN: ${ASD_INSTALL_CUDNN:-0}
        CUDNN_APT_PACKAGES: ${ASD_CUDNN_APT_PACKAGES:-cudnn9-cuda-12}
        REQUIRE_ROS: ${ASD_REQUIRE_ROS:-1}
        PIP_INDEX_URL: ${ASD_PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${ASD_PIP_EXTRA_INDEX_URL:-}
        UPGRADE_PIP: ${ASD_UPGRADE_PIP:-0}
        PIP_RETRIES: ${ASD_PIP_RETRIES:-2}
        PIP_TIMEOUT: ${ASD_PIP_TIMEOUT:-30}
        INSTALL_PYCUDA: ${ASD_INSTALL_PYCUDA:-1}
        PYCUDA_VERSION: ${ASD_PYCUDA_VERSION:-2026.1}
    container_name: asd_runtime_slim
    network_mode: host
    ipc: host
    runtime: nvidia
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DISTRO=${ASD_ROS_DISTRO:-noetic}
      - ROS_ROOT=${ASD_ROS_ROOT:-/opt/ros/${ASD_ROS_DISTRO:-noetic}}
      - ROS_SETUP_PATH=${ASD_ROS_SETUP_PATH:-/ros_noetic/catkin_ws/devel/setup.bash}
      - ROS_FALLBACK_SETUP_PATH=${ASD_ROS_FALLBACK_SETUP_PATH:-/ros_noetic/catkin_ws/devel/setup.bash}
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://192.168.217.100:11311}
      - ASD_HOST_CUDNN_SOURCE_DIR=${ASD_HOST_CUDNN_SOURCE_DIR:-/host/usr/lib/aarch64-linux-gnu}
      - ASD_HOST_CUDNN_LINK_DIR=${ASD_HOST_CUDNN_LINK_DIR:-/usr/local/lib/asd-host-cudnn}
      - AUTO_INSTALL_DEPS=0
    volumes:
      - ./:/workspace/asd_runtime_slim
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /usr/lib/aarch64-linux-gnu:/host/usr/lib/aarch64-linux-gnu:ro
    working_dir: /workspace/asd_runtime_slim
    entrypoint: ["/workspace/asd_runtime_slim/scripts/entrypoint.sh"]
    command: ["bash"]
